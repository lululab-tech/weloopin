/* ════════════════════════════════
   VIEW: ABOUT
════════════════════════════════ */
function viewAbout(){
  return`<div class="about-page"><div class="wrap-sm">
    <div class="about-top">
      <div class="about-top-inner">
        <div class="logo lg" style="margin:0 auto 20px;display:inline-flex"><span class="logo-we">we</span><span class="logo-loopin">loopin</span></div>
        <h1>A place where researchers <em>speak freely.</em></h1>
        <p style="margin-top:12px">Real experiences. Honest conversations. No performance. WeLoopin exists because the most valuable career insights happen in private, and they shouldn't have to.</p>
      </div>
    </div>

    <div class="card about-section" style="margin-bottom:12px">
      <h2>What WeLoopin is for</h2>
      <p>WeLoopin is for researchers at every stage of their career. It's a place to share observations from your sector, ask questions you can't ask on LinkedIn, process difficult professional moments, and learn from people who've genuinely been through it.</p>
      <p>Browse without signing up. Like and comment freely. Share anonymously if you need to. Sign up only if you want to build a profile and connect with others.</p>
    </div>

    <div class="card about-section" style="margin-bottom:12px">
      <h2>Our community values</h2>
      <div class="values-grid">
        <div class="value-card"><div class="value-card-title">Honesty over polish</div><p>Raw, real accounts of what happened are more useful than perfectly packaged stories.</p></div>
        <div class="value-card"><div class="value-card-title">Generosity by default</div><p>We share what we know. We answer questions. We remember that someone shared with us first.</p></div>
        <div class="value-card"><div class="value-card-title">Critique the system</div><p>We talk about toxic cultures and broken processes. We never target individuals by name.</p></div>
        <div class="value-card"><div class="value-card-title">No hierarchy of experience</div><p>Junior insights are as welcome as senior ones. Every perspective has something to teach.</p></div>
      </div>
    </div>

    <div class="card about-section" style="margin-bottom:12px">
      <h2>Four topics, one community</h2>
      <div class="about-cats-list">
        ${CATS.map((c,i)=>{
          const bg=['#CBDBEE','#FBDCF8','#FFF8E0','#FED6C0'][i];
          const bd=[`var(--cat1bd)`,`var(--cat2bd)`,`var(--cat3bd)`,`var(--cat4bd)`][i];
          const tx=[`var(--cat1tx)`,`var(--cat2tx)`,`var(--cat3tx)`,`var(--cat4tx)`][i];
          const stk=['#2E6DA4','#9B3DB5','#8A6500','#C25A1A'][i];
          const iconPath={
            'job-readiness':'<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><path d="M2 12h20"/>',
            'career-traps':'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
            'career-opportunities':'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><line x1="2" y1="12" x2="22" y2="12"/>',
            'career-acceleration':'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
          }[c.id]||'';
          return`<div class="about-cat-item" style="background:${bg};border:1.5px solid ${bd};color:${tx}" onclick="go('category',{id:'${c.id}'})">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${stk}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg>
              </div>
              <div><h3 style="margin-bottom:3px">${c.label}</h3><p>${c.longDesc}</p></div>
            </div>
            <span style="font-size:18px;flex-shrink:0;margin-left:10px">&#8594;</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card about-section" style="margin-bottom:12px">
      <h2>What's welcome here, and what isn't</h2>
      <div class="rules-grid">
        <div class="rule-card ok"><div class="rule-card-title">This is a safe space for</div><p>Real stories from your career, messy bits included. Honest takes on workplace cultures and systems. Questions at any experience level. Career advice from lived experience. Posts shared anonymously, if that feels right.</p></div>
        <div class="rule-card no"><div class="rule-card-title">Please don't</div><p>Attack or name specific people. Share confidential client or company data. Post content that's discriminatory. Spam or promote without adding real value. Present opinions as facts.</p></div>
        <div class="rule-card ok"><div class="rule-card-title">Your privacy</div><p>You can like, comment, and share without an account. Your full profile is only visible to connected users by default. You control what others see.</p></div>
        <div class="rule-card no"><div class="rule-card-title">Moderation</div><p>All reports are reviewed privately. Repeated violations result in account suspension. The Career Traps space is for genuine support, not venting without purpose.</p></div>
      </div>
    </div>

    <div style="text-align:center;padding:40px 0">
      ${S.user
        ?`<div style="font-weight:900;font-size:21px;color:var(--c6);margin-bottom:8px;letter-spacing:-.3px">You're in the loop.</div><p style="color:var(--c4);margin-bottom:18px;font-weight:500">Go share something. Someone out there needs to read it.</p><button class="btn btn-p btn-lg" onclick="go('create-post')">Share your experience</button>`
        :`<div style="font-weight:900;font-size:21px;color:var(--c6);margin-bottom:8px;letter-spacing:-.3px">Ready to join the loop?</div><p style="color:var(--c4);margin-bottom:18px;font-weight:500">Browse freely. Comment and like without signing up. Share anonymously.</p><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-p btn-lg" onclick="go('create-post')">Share anonymously</button><button class="btn btn-outline btn-lg" onclick="showSignup()">Join WeLoopin</button></div>`
      }
    </div>
  </div></div>`;
}

/* ════════════════════════════════
   VIEW: SUPPORT
════════════════════════════════ */
function viewSupport(){
  return`<div class="support-page"><div class="wrap-sm">
    <div style="text-align:center;margin-bottom:34px">
      <div style="font-weight:900;font-size:clamp(26px,4vw,38px);color:var(--c6);letter-spacing:-.8px;margin-bottom:7px">We're here to help</div>
      <p style="font-size:15px;color:var(--c4);font-weight:500">Got a question, spotted a bug, or have a suggestion? We read every message.</p>
    </div>
    <div class="card card-p-lg">
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="fg"><label class="flabel">Your Name</label><input class="finput" id="sp-n" placeholder="How should we address you?"></div>
        <div class="fg"><label class="flabel">Email<span class="req">*</span></label><input class="finput" id="sp-e" type="email" placeholder="Where should we reply?" value="${S.user?esc(S.user.email):''}"></div>
        <div class="fg"><label class="flabel">Topic</label><select class="fselect" id="sp-t"><option value="">Select a topic...</option><option>Bug report</option><option>Feature request</option><option>Account help</option><option>Community guidelines question</option><option>Content moderation</option><option>Other</option></select></div>
        <div class="fg"><label class="flabel">Message<span class="req">*</span></label><textarea class="ftextarea" id="sp-m" style="min-height:150px" placeholder="Describe your request or issue in detail."></textarea></div>
        <button class="btn btn-p btn-lg" style="width:100%" onclick="submitSupport()">Send Message</button>
        <p style="font-size:12px;color:var(--c4);text-align:center;font-weight:500">We aim to respond within 48 hours. Your message goes directly to our team at design.naodong@gmail.com</p>
      </div>
    </div>
  </div></div>`;
}
function submitSupport(){
  const em=(document.getElementById('sp-e')||{}).value?.trim(),msg=(document.getElementById('sp-m')||{}).value?.trim();
  if(!em||!msg){toast('Please fill in your email and message','error');return}
  toast('Message sent! We\'ll get back to you within 48 hours.','success',4500);
  ['sp-n','sp-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
}

/* ════════════════════════════════
   FOOTER
════════════════════════════════ */
function renderFooter(){
  return`<footer style="background:var(--c6);padding:36px 0">
    <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px">
      <div class="logo" onclick="go('home')" style="cursor:pointer"><span class="logo-we" style="color:var(--p2)">we</span><span class="logo-loopin" style="color:var(--s2)">loopin</span></div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        ${CATS.map(c=>`<button style="background:transparent;border:none;color:rgba(255,255,255,.35);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:700;transition:color .13s" onmouseover="this.style.color='var(--p2)'" onmouseout="this.style.color='rgba(255,255,255,.35)'" onclick="go('category',{id:'${c.id}'})">${c.short}</button>`).join('')}
        <button style="background:transparent;border:none;color:rgba(255,255,255,.35);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:700" onmouseover="this.style.color='var(--p2)'" onmouseout="this.style.color='rgba(255,255,255,.35)'" onclick="go('about')">About</button>
        <button style="background:transparent;border:none;color:rgba(255,255,255,.35);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:700" onmouseover="this.style.color='var(--p2)'" onmouseout="this.style.color='rgba(255,255,255,.35)'" onclick="go('support')">Support</button>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.32);font-weight:500;text-align:right;line-height:1.6">
        &copy; 2025 WeLoopin. All rights reserved.<br>
        <span style="color:rgba(255,255,255,.20)">Community content belongs to its respective authors.</span>
      </div>
    </div>
  </footer>`;
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function render(){
  renderNav();
  let html='';
  switch(S.view){
    case'home':         html=viewHome();break;
    case'category':     html=viewCategory();break;
    case'post':         html=viewPost();break;
    case'create-post':  html=viewCreate();break;
    case'profile':      html=viewProfile();break;
    case'edit-profile': html=viewEditProfile();break;
    case'about':        html=viewAbout();break;
    case'support':      html=viewSupport();break;
    default:            html=viewHome();
  }
  document.getElementById('app').innerHTML=html+renderFooter();
  if(S.view==='create-post')renderTags();
}

document.addEventListener('click',e=>{
  if(S.userMenuOpen&&!e.target.closest('.u-wrap')){S.userMenuOpen=false;renderNav()}
  if(mobileMenuOpen&&!e.target.closest('.mobile-drawer-panel')&&!e.target.closest('.nav-hamburger')){closeMobileMenu()}
});

render();
</script>
</body>
</html>
